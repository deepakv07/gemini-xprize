name: OmniFlow CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Deepakswamy@123
          POSTGRES_DB: omniflow_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Prisma Generate
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:Deepakswamy@123@localhost:5432/omniflow_dev?schema=public"

      - name: Run Tests
        run: npm run test
        env:
          DATABASE_URL: "postgresql://postgres:Deepakswamy@123@localhost:5432/omniflow_dev?schema=public"
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          REDIS_DB: 0

      - name: Build Application
        run: npm run build
