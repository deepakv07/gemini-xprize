version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: omniflow_prod_postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Deepakswamy@123
      - POSTGRES_DB=omniflow_prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d omniflow_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omniflow_prod_redis
    restart: always
    command: redis-server --requirepass OmniFlow@Redis2025!
    ports:
      - '6379:6379'
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "OmniFlow@Redis2025!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: omniflow_prod_rabbitmq
    restart: always
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omniflow_prod_backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:Deepakswamy@123@postgres:5432/omniflow_prod?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=OmniFlow@Redis2025!
      - REDIS_DB=0
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - JWT_SECRET=${JWT_SECRET}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: omniflow_prod_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: omniflow_prod_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.cfg:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.cfg'
    ports:
      - '9090:9090'

  grafana:
    image: grafana/grafana:latest
    container_name: omniflow_prod_grafana
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - grafana_prod_data:/var/lib/grafana

volumes:
  postgres_prod_data:
  redis_prod_data:
  grafana_prod_data:
